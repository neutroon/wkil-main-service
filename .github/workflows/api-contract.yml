name: API Contract

on:
  pull_request:
    paths:
      - "docs/openapi.yaml"
      - "redocly.yaml"
      - "scripts/check-openapi-routes.js"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
      - master
    paths:
      - "docs/openapi.yaml"
      - "redocly.yaml"
      - "scripts/check-openapi-routes.js"
      - "src/**"
      - "package.json"
      - "package-lock.json"

jobs:
  api-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAPI contract
        run: npm run docs:check

      - name: Typecheck backend
        run: npx tsc --noEmit
