openapi: 3.1.0
info:
  title: WKIL Backend API
  version: 1.0.0
  license:
    name: ISC
    identifier: ISC
  description: Contract for the Express v1 backend, including auth, Meta channels, content, media, widgets, admin, manager, analytics, integrations, and operational endpoints.
servers:
  - url: /
    description: Current API host
security:
  - bearerAuth: []
  - accessTokenCookie: []
tags:
  - name: Docs
    description: OpenAPI document and interactive documentation.
  - name: Health
    description: Operational health endpoints.
  - name: Auth
    description: Identity, sessions, CSRF, and account lifecycle.
  - name: Messenger
    description: Facebook Messenger webhooks, conversations, and replies.
  - name: WhatsApp
    description: WhatsApp webhooks, accounts, conversations, templates, and admin operations.
  - name: Inbox
    description: Unified Meta conversation operations.
  - name: Facebook
    description: Facebook OAuth, pages, posting, comments, and analytics.
  - name: Meta Media
    description: Secure proxying for Meta-hosted media.
  - name: Leads
    description: Lead capture and lead listing.
  - name: Customers
    description: Customer records and customer conversation history.
  - name: Admin
    description: Platform administration, billing, users, assignments, and support operations.
  - name: Mission Control
    description: Bull Board queue monitoring routes.
  - name: Manager
    description: Manager dashboard, managed users, and assignment operations.
  - name: Dashboard
    description: User dashboard statistics, activity, and setup progress.
  - name: Business Profile
    description: Business profile configuration and brand assets.
  - name: Agent Actions
    description: External action sources and workflows used by the AI agent.
  - name: Widget
    description: Authenticated web widget install and inbox management.
  - name: Public Widget
    description: Public website widget configuration, chat, media, history, and preflight routes.
  - name: Content
    description: AI content briefs, plans, post generation, approval, and uploads.
  - name: Media
    description: Media library upload, metadata, proxying, sync, and AI generation.
  - name: Analytics
    description: AI analytics endpoints.
  - name: Scraping
    description: Website analysis for onboarding.
paths:
  /v1/openapi.json:
    get:
      tags: [Docs]
      operationId: getOpenApiJson
      summary: Get the OpenAPI document as JSON
      security: []
      responses:
        "200":
          description: Parsed OpenAPI document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500": { $ref: "#/components/responses/ServerError" }
  /docs:
    get:
      tags: [Docs]
      operationId: getSwaggerDocs
      summary: Open Swagger UI
      security: []
      responses:
        "200":
          description: Swagger UI HTML.
          content:
            text/html:
              schema:
                type: string
  /v1/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check API and database health
      security: []
      responses:
        "200":
          description: Healthy service state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        "503":
          description: Degraded service state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: registerAuthUser
      summary: Register a user
      security: []
      requestBody: { $ref: "#/components/requestBodies/Register" }
      responses:
        "201": { $ref: "#/components/responses/AuthOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: loginAuthUser
      summary: Log in and set auth cookies
      security: []
      requestBody: { $ref: "#/components/requestBodies/Login" }
      responses:
        "200": { $ref: "#/components/responses/AuthOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/auth/social/google:
    post:
      tags: [Auth]
      operationId: googleSocialAuth
      summary: Authenticate with a Google token
      security: []
      requestBody: { $ref: "#/components/requestBodies/SocialAuth" }
      responses:
        "200": { $ref: "#/components/responses/AuthOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/social/facebook:
    post:
      tags: [Auth]
      operationId: facebookSocialAuth
      summary: Authenticate with a Facebook token
      security: []
      requestBody: { $ref: "#/components/requestBodies/SocialAuth" }
      responses:
        "200": { $ref: "#/components/responses/AuthOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/verify-email:
    get:
      tags: [Auth]
      operationId: verifyEmail
      summary: Verify an email address
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Start password reset
      security: []
      requestBody: { $ref: "#/components/requestBodies/EmailOnly" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password with token
      security: []
      requestBody: { $ref: "#/components/requestBodies/ResetPassword" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/resend-verification:
    post:
      tags: [Auth]
      operationId: resendVerification
      summary: Resend verification email
      security: []
      requestBody: { $ref: "#/components/requestBodies/EmailOnly" }
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/auth/csrf-token:
    get:
      tags: [Auth]
      operationId: getCsrfToken
      summary: Get CSRF token
      security: []
      responses:
        "200":
          description: CSRF token response.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsrfTokenResponse" }
  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate refresh token and return a new access token
      security:
        - refreshTokenCookie: []
      responses:
        "200": { $ref: "#/components/responses/AuthOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Clear auth cookies and revoke refresh state when possible
      security:
        - bearerAuth: []
          csrfHeader: []
        - accessTokenCookie: []
          csrfHeader: []
        - csrfHeader: []
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /v1/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      tags: [Auth]
      operationId: updateCurrentUser
      summary: Update current user profile
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/UpdateCurrentUser" }
      responses:
        "200": { $ref: "#/components/responses/ProfileUpdateOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Auth]
      operationId: deleteCurrentUserAccount
      summary: Delete the current user account
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /v1/auth/me/password:
    put:
      tags: [Auth]
      operationId: changeCurrentUserPassword
      summary: Change current user password
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/ChangePassword" }
      responses:
        "200": { $ref: "#/components/responses/ProfileUpdateOk" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/messenger/webhook:
    get:
      tags: [Messenger]
      operationId: verifyMessengerWebhook
      summary: Verify Messenger webhook subscription
      security: []
      parameters:
        - { name: hub.mode, in: query, required: false, schema: { type: string } }
        - { name: hub.verify_token, in: query, required: false, schema: { type: string } }
        - { name: hub.challenge, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: Webhook challenge or verification status. }
    post:
      tags: [Messenger]
      operationId: handleMessengerWebhook
      summary: Receive Messenger webhook events
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/messenger:
    get:
      tags: [Messenger]
      operationId: listMessengerConversations
      summary: List Messenger conversations
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/ChannelQuery"
        - $ref: "#/components/parameters/StatusQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/messenger/{id}/messages:
    get:
      tags: [Messenger]
      operationId: listMessengerMessages
      summary: List Messenger conversation messages
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/messenger/conversations/{id}/messages:
    post:
      tags: [Messenger]
      operationId: sendMessengerMessage
      summary: Send a manual Messenger reply
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/MessengerReply" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/messenger/conversations/{id}/media:
    post:
      tags: [Messenger]
      operationId: sendMessengerMedia
      summary: Upload and send media to a Messenger conversation
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/SingleFileUpload" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /v1/whatsapp/webhook:
    get:
      tags: [WhatsApp]
      operationId: verifyWhatsAppWebhook
      summary: Verify WhatsApp webhook subscription
      security: []
      parameters:
        - { name: hub.mode, in: query, required: false, schema: { type: string } }
        - { name: hub.verify_token, in: query, required: false, schema: { type: string } }
        - { name: hub.challenge, in: query, required: false, schema: { type: string } }
      responses:
        "200": { description: Webhook challenge or verification status. }
    post:
      tags: [WhatsApp]
      operationId: handleWhatsAppWebhook
      summary: Receive WhatsApp webhook events
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/oauth/phone-numbers:
    get:
      tags: [WhatsApp]
      operationId: previewWhatsAppPhoneNumbers
      summary: Preview OAuth phone numbers
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/oauth:
    post:
      tags: [WhatsApp]
      operationId: connectWhatsAppOAuth
      summary: Connect WhatsApp OAuth assets
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/GenericJson" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/whatsapp/accounts:
    get:
      tags: [WhatsApp]
      operationId: listWhatsAppAccounts
      summary: List connected WhatsApp accounts
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/accounts/{id}:
    delete:
      tags: [WhatsApp]
      operationId: deactivateWhatsAppAccount
      summary: Deactivate a WhatsApp account
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/MessageOk" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/whatsapp/accounts/{id}/link-business:
    post:
      tags: [WhatsApp]
      operationId: linkWhatsAppBusiness
      summary: Link WhatsApp account to a business profile
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/GenericJson" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/accounts/{id}/unlink-business:
    delete:
      tags: [WhatsApp]
      operationId: unlinkWhatsAppBusiness
      summary: Unlink WhatsApp account from its business profile
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/conversations:
    get:
      tags: [WhatsApp]
      operationId: listWhatsAppConversations
      summary: List WhatsApp conversations
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/ChannelQuery"
        - $ref: "#/components/parameters/StatusQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/conversations/{id}/messages:
    get:
      tags: [WhatsApp]
      operationId: listWhatsAppMessages
      summary: List WhatsApp conversation messages
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
    post:
      tags: [WhatsApp]
      operationId: sendWhatsAppMessage
      summary: Send a manual WhatsApp reply
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/ConversationMessage" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/whatsapp/conversations/{id}/media:
    post:
      tags: [WhatsApp]
      operationId: sendWhatsAppMedia
      summary: Upload and send media to a WhatsApp conversation
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/SingleFileUpload" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/whatsapp/conversations/{id}/template:
    post:
      tags: [WhatsApp]
      operationId: sendWhatsAppTemplate
      summary: Send a WhatsApp template message
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/WhatsAppTemplate" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/templates:
    get:
      tags: [WhatsApp]
      operationId: listWhatsAppTemplates
      summary: List WhatsApp templates
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/whatsapp/admin/users/{userId}/accounts:
    get:
      tags: [WhatsApp]
      operationId: adminListWhatsAppUserAccounts
      summary: Admin list WhatsApp accounts for a user
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /v1/whatsapp/admin/transfer:
    post:
      tags: [WhatsApp]
      operationId: adminTransferWhatsApp
      summary: Admin transfer WhatsApp ownership or assets
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/GenericJson" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/meta/conversations/{id}/messages:
    get:
      tags: [Inbox]
      operationId: listMetaConversationMessages
      summary: List unified Meta conversation messages
      parameters:
        - $ref: "#/components/parameters/IdPath"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/meta/conversations/{id}/read:
    patch:
      tags: [Inbox]
      operationId: markMetaConversationRead
      summary: Mark unified conversation as read
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/SuccessOk" }
  /v1/meta/conversations/{id}/typing:
    post:
      tags: [Inbox]
      operationId: sendMetaTypingSignal
      summary: Send unified conversation typing signal
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/SuccessOk" }
  /v1/meta/conversations/{id}/ai-toggle:
    patch:
      tags: [Inbox]
      operationId: toggleMetaConversationAi
      summary: Toggle AI handling for a unified conversation
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/ConversationAiToggle" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/meta/conversations/{id}/status:
    patch:
      tags: [Inbox]
      operationId: updateMetaConversationStatus
      summary: Update unified conversation status
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody: { $ref: "#/components/requestBodies/ConversationStatus" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/meta/conversations/{id}:
    delete:
      tags: [Inbox]
      operationId: deleteMetaConversation
      summary: Delete unified conversation
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/SuccessOk" }

  /v1/facebook/login:
    get:
      tags: [Facebook]
      operationId: startFacebookLogin
      summary: Build Facebook OAuth login URL
      parameters:
        - { name: redirect_uri, in: query, required: true, schema: { type: string, format: uri } }
        - { name: state, in: query, required: false, schema: { type: string, minLength: 8, maxLength: 256 } }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /v1/facebook/login/callback:
    post:
      tags: [Facebook]
      operationId: completeFacebookLoginCallback
      summary: Complete Facebook OAuth code callback
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/FacebookCallback" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/login/sdk:
    post:
      tags: [Facebook]
      operationId: completeFacebookSdkLogin
      summary: Connect Facebook using JS SDK token
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/FacebookSdk" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/validate-token:
    get:
      tags: [Facebook]
      operationId: validateFacebookToken
      summary: Validate connected Facebook token
      parameters:
        - name: access_token
          in: query
          required: false
          schema: { type: string }
          description: Optional token override. When omitted, the backend validates the current user's connected Facebook account token.
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/accounts:
    get:
      tags: [Facebook]
      operationId: listFacebookAccounts
      summary: List Facebook accounts
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/accounts/{id}:
    delete:
      tags: [Facebook]
      operationId: deactivateFacebookAccount
      summary: Deactivate a Facebook account
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { $ref: "#/components/responses/SuccessOk" }
  /v1/facebook/switch-device:
    post:
      tags: [Facebook]
      operationId: switchFacebookDevice
      summary: Update Facebook device context
      security: [ { bearerAuth: [], csrfHeader: [] }, { accessTokenCookie: [], csrfHeader: [] } ]
      requestBody: { $ref: "#/components/requestBodies/GenericJson" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/analytics:
    get:
      tags: [Facebook]
      operationId: getFacebookAnalytics
      summary: Get Facebook analytics
      parameters:
        - $ref: "#/components/parameters/DaysQuery"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/admin/analytics:
    get:
      tags: [Facebook]
      operationId: getFacebookAdminAnalytics
      summary: Get Facebook admin analytics
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/facebook/pages:
    get:
      tags: [Facebook]
      operationId: listFacebookPages
      summary: List Facebook pages
