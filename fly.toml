# fly.toml app configuration file generated for wkil-backend on 2025-09-20T09:54:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wkil-backend'
primary_region = 'cdg'

[build]

[deploy]
  release_command = 'sh -c "DATABASE_URL=$DIRECT_URL npx prisma migrate deploy"'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
