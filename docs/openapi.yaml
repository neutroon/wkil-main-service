components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: accessToken
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refreshToken
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    widgetSiteKey:
      type: apiKey
      in: header
      name: X-Widget-Site-Key
  parameters:
    IdPath: { name: id, in: path, required: true, schema: { type: integer } }
    UserIdPath: { name: userId, in: path, required: true, schema: { type: integer } }
    ProfileIdPath: { name: profileId, in: path, required: true, schema: { type: integer } }
    SourceIdPath: { name: sourceId, in: path, required: true, schema: { type: integer } }
    WorkflowIdPath: { name: workflowId, in: path, required: true, schema: { type: integer } }
    PageIdPath: { name: pageId, in: path, required: true, schema: { type: string, minLength: 1 } }
    PlanIdPath: { name: planId, in: path, required: true, schema: { type: integer } }
    PostIdPath: { name: postId, in: path, required: true, schema: { type: integer } }
    PostIdStringPath: { name: postId, in: path, required: true, schema: { type: string, minLength: 1 } }
    CommentIdPath: { name: commentId, in: path, required: true, schema: { type: string, minLength: 1 } }
    MessageIdPath: { name: messageId, in: path, required: true, schema: { type: integer } }
    ConversationIdPath: { name: conversationId, in: path, required: true, schema: { type: integer } }
    MediaIdStringPath: { name: mediaId, in: path, required: true, schema: { type: string, minLength: 1 } }
    PageQuery: { name: page, in: query, required: false, schema: { type: integer, minimum: 1, default: 1 } }
    LimitQuery: { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    OffsetQuery: { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, default: 0 } }
    CursorQuery: { name: cursor, in: query, required: false, schema: { type: integer } }
    ChannelQuery: { name: channel, in: query, required: false, schema: { type: string } }
    StatusQuery: { name: status, in: query, required: false, schema: { type: string } }
    DaysQuery: { name: days, in: query, required: false, schema: { type: integer } }
    WidgetSiteKeyHeader:
      name: X-Widget-Site-Key
      in: header
      required: false
      schema: { type: string }
  responses:
    Ok:
      description: Successful response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GenericObject" }
    Created:
      description: Created response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GenericObject" }
    Accepted:
      description: Accepted for background processing.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageResponse" }
    AuthOk:
      description: Auth response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AuthResponse" }
    ProfileUpdateOk:
      description: Profile update response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ProfileUpdateResponse" }
    MessageOk:
      description: Message response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageResponse" }
    SuccessOk:
      description: Success response.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SuccessResponse" }
    EventStream:
      description: Server-sent event stream.
      content:
        text/event-stream:
          schema: { type: string }
    BinaryStream:
      description: Binary stream.
      content:
        application/octet-stream:
          schema: { type: string, format: binary }
    Html:
      description: HTML response.
      content:
        text/html:
          schema: { type: string }
    BadRequest:
      description: Bad request or validation failure.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Authentication required or failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Permission denied.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ServerError:
      description: Server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  requestBodies:
    GenericJson:
      required: false
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GenericObject" }
    Register:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/RegisterRequest" }
    Login:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/LoginRequest" }
    SocialAuth:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SocialAuthRequest" }
    EmailOnly:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/EmailOnlyRequest" }
    ResetPassword:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
    UpdateCurrentUser:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/UpdateCurrentUserRequest" }
    ChangePassword:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
    CreateAdminManager:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/CreateAdminManagerRequest" }
    RegisterPlatformUser:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/RegisterPlatformUserRequest" }
    UpdateUser:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/UpdateUserRequest" }
    BillingSettings:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [billing_multiplier]
            properties:
              billing_multiplier: { type: number }
    BusinessUsage:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [tokensUsed]
            properties:
              tokensUsed: { type: number }
    UserAssignment:
